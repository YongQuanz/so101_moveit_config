default_velocity_scaling_factor: 0.5
default_acceleration_scaling_factor: 0.5

joint_limits:
  shoulder_pan:
    has_velocity_limits: true
    max_velocity: 1.5        # rad/s - conservative for shoulder
    has_acceleration_limits: true
    max_acceleration: 2.0    # rad/s^2
  shoulder_lift:
    has_velocity_limits: true
    max_velocity: 1.0        # slower - carries full arm weight
    has_acceleration_limits: true
    max_acceleration: 1.5
  elbow_flex:
    has_velocity_limits: true
    max_velocity: 1.5
    has_acceleration_limits: true
    max_acceleration: 2.0
  wrist_flex:
    has_velocity_limits: true
    max_velocity: 2.0        # wrist can move faster, less load
    has_acceleration_limits: true
    max_acceleration: 3.0
  wrist_roll:
    has_velocity_limits: true
    max_velocity: 2.0
    has_acceleration_limits: true
    max_acceleration: 3.0
  gripper:
    has_velocity_limits: true
    max_velocity: 1.0        # slow gripper to avoid crushing objects
    has_acceleration_limits: true
    max_acceleration: 1.5